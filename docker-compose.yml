# TerraAgent Full Stack Docker Compose
# Usage: APP_ENV=production docker compose up -d

services:
  # ============ Database (PostgreSQL + pgvector) ============
  db:
    image: pgvector/pgvector:pg17
    container_name: agent-db
    ports:
      - "15433:5432"
    env_file:
      - backend/.env.${APP_ENV:-development}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - terraagent

  # ============ Backend API ============
  backend:
    build:
      context: backend
      args:
        APP_ENV: ${APP_ENV:-development}
    ports:
      - "8009:8009"
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
      - rag-uploads:/opt/terra-agent/data/rag
    env_file:
      - backend/.env.${APP_ENV:-development}
    container_name: agent-backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    networks:
      - terraagent

  # ============ Frontend ============
  frontend:
    build:
      context: frontend
    ports:
      - "18080:80"
    container_name: agent-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - terraagent

networks:
  terraagent:
    driver: bridge

volumes:
  postgres-data:
  rag-uploads:
